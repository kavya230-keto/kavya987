<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Grade Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Student Result Calculator</h2>

        <input type="number" id="sub1" placeholder="Enter Subject 1 Marks">
        <input type="number" id="sub2" placeholder="Enter Subject 2 Marks">
        <input type="number" id="sub3" placeholder="Enter Subject 3 Marks">
        <input type="number" id="sub4" placeholder="Enter Subject 4 Marks">

        <button onclick="calculateResult()">Calculate Result</button>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>

</body>
</html>
